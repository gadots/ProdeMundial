# Sync de partidos del Mundial 2026.
#
# GitHub Actions no garantiza el schedule */5 en el plan gratuito
# (en la práctica corre cada 30-120 min). Para compensar, además del
# */5 de best-effort se agregan disparos explícitos en cada ventana
# horaria donde hay partidos: los equipos juegan a las 17, 20 y 23 UTC
# (2pm, 5pm y 8pm hora Argentina). Se dispara al inicio, a los 30min
# y al final de cada ventana para cubrir arranque + final del partido.
#
# Esto NO reemplaza cron-job.org (que es el sync confiable de 5min).
# GitHub aquí actúa como respaldo adicional.
#
# Setup requerido en GitHub (Settings → Secrets and variables → Actions):
#   Secrets:   CRON_SECRET  → mismo valor que en Vercel env vars
#   Variables: APP_URL      → ej: https://elprode.vercel.app

name: Sync Matches

on:
  schedule:
    # ── Best-effort cada 5 min durante el Mundial ─────────────────────
    - cron: "*/5 * 11-30 6 *"    # junio 11-30
    - cron: "*/5 * 1-19 7 *"     # julio 1-19

    # ── Disparos explícitos en ventanas de partido (UTC) ──────────────
    # Partidos 1er turno: ~17:00 UTC (2pm ARG) - inicio, mitad, final
    - cron: "0 17 * 6,7 *"
    - cron: "30 17 * 6,7 *"
    - cron: "0 19 * 6,7 *"

    # Partidos 2do turno: ~20:00 UTC (5pm ARG) - inicio, mitad, final
    - cron: "0 20 * 6,7 *"
    - cron: "30 20 * 6,7 *"
    - cron: "0 22 * 6,7 *"

    # Partidos 3er turno: ~23:00 UTC (8pm ARG) - inicio, mitad, final
    - cron: "0 23 * 6,7 *"
    - cron: "30 23 * 6,7 *"
    - cron: "0 1 * 6,7 *"

    # ── Diario el resto del año ───────────────────────────────────────
    - cron: "0 6 * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger sync
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "ERROR: APP_URL variable not set in GitHub Actions."
            echo "Go to: Settings → Secrets and variables → Actions → Variables → New repository variable"
            echo "Name: APP_URL  Value: https://elprode.vercel.app"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "ERROR: CRON_SECRET secret not set in GitHub Actions."
            echo "Go to: Settings → Secrets and variables → Actions → Secrets → New repository secret"
            echo "Name: CRON_SECRET  Value: (same value as CRON_SECRET in Vercel env vars)"
            exit 1
          fi
          BODY=$(curl -s -L -w "\n%{http_code}" \
            -X POST "${APP_URL%/}/api/admin/sync" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$BODY" | tail -1)
          RESPONSE=$(echo "$BODY" | sed '$d')
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $RESPONSE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sync failed with status $HTTP_CODE"
            exit 1
          fi
